events { 
    worker_connections 1024; 
} 
 
http { 
    map $http_upgrade $connection_upgrade { 
        default upgrade; 
        '' close; 
    } 
  
    upstream pings-upstream { 
        server 127.0.0.1:80; 
    } 
    server { 
        listen 443 ssl; 
        server_name your-domian; 
        ssl_certificate /etc/letsencrypt/live/your-domian/fullchain.pem; 
        ssl_certificate_key /etc/letsencrypt/live/your-domian/privkey.pem; 
         
        location /ws/ { 
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always; 
            add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Accept,Content-Type, Origin,x-auth' always; 
            add_header 'Origin' 'https://dynast.io' always; 
            add_header 'Referer' 'https://dynast.io' always; 
            proxy_http_version 1.1; 
            proxy_set_header Upgrade $http_upgrade; 
            proxy_set_header Connection $connection_upgrade; 
            proxy_set_header Origin ""; 
            proxy_connect_timeout 43200000; 
            proxy_buffering off; 
            proxy_set_header X-Real-IP $remote_addr; 
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; 
proxy_pass http://pings-upstream/ws/; 
tcp_nodelay on; 
} 
location / { 
add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always; 
add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Accept,Content-Type, Origin,x-auth' always; 
add_header 'Origin' 'https://dynast.io' always; 
add_header 'Referer' 'https://dynast.io' always; 
proxy_set_header X-Real-IP $remote_addr; 
proxy_pass http://pings-upstream/; 
} 
} 
} 